version: '3.8'

services:
  postgres:
    image: postgis/postgis:14-3.4
    container_name: sponty-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: sponty
      POSTGRES_USER: sponty
      POSTGRES_PASSWORD: sponty
    ports:
      - "5435:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: sponty-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@sponty.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres
